<header class="header">
  <a routerLink="/" class="logo">Arbitration Art</a>

  <nav class="header-nav">
    @if (auth.user(); as user) {
      <a routerLink="/profile" class="user-info">
        <span class="user-avatar">{{ user.email[0] | uppercase }}</span>
        <span class="user-name">{{ user.email }}</span>
      </a>
    }
  </nav>
</header>

<main class="content">
  <router-outlet />
</main>
