<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">Arbitration Art</h1>
    <p class="login-subtitle">Войдите в систему</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <tui-textfield [tuiTextfieldSize]="'m'">
        <label tuiLabel>Email</label>
        <input tuiTextfield formControlName="email" type="email" />
      </tui-textfield>

      <tui-textfield [tuiTextfieldSize]="'m'">
        <label tuiLabel>Пароль</label>
        <input tuiTextfield formControlName="password" type="password" />
      </tui-textfield>

      @if (errorMessage()) {
        <tui-error [error]="errorMessage()" />
      }

      <button
        tuiButton
        type="submit"
        appearance="primary"
        size="m"
        [disabled]="form.invalid || loading()"
        class="login-button"
      >
        @if (loading()) {
          Вход...
        } @else {
          Войти
        }
      </button>
    </form>
  </div>
</div>
